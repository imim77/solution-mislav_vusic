services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5188:5188"
    environment:
      - ConnectionStrings__Proizvodi=Data Source=/app/data/Proizvodi.db
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data: